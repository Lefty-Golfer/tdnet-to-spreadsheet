name: TDnet Scraper

# 実行タイミングの設定
on:
  # 手動で実行できるボタンを表示
  workflow_dispatch:
  # 定期実行（日本時間の平日16:00に実行）
  # ※UTC(協定世界時)で指定するため、日本時間から-9時間した 07:00 を設定
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: リポジトリのコードを取得
      uses: actions/checkout@v3

    - name: Python環境のセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 必要なライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: スクリプトの実行
      env:
        # Step1で登録したSecretsを環境変数としてPythonに渡す
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
      run: python main.py
